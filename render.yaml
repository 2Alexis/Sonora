# Blueprint Render — SONORA tout-en-un (frontend + backend dans une image).
# Sur https://render.com : New + → Blueprint → sélectionne ce repo.
# Le Dockerfile racine build le frontend ET lance l'API qui le sert.
# Il ne reste qu'à brancher une base Neo4j (Aura) via les secrets ci-dessous.
services:
  - type: web
    name: sonora
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ENRICHMENT_ENABLED
        value: "true"
      # --- À renseigner dans le dashboard Render (recopier depuis le fichier Aura) ---
      - key: NEO4J_URI            # NEO4J_URI du fichier Aura (neo4j+s://xxxx.databases.neo4j.io)
        sync: false
      - key: NEO4J_USER           # NEO4J_USERNAME du fichier Aura (souvent l'ID d'instance, ex : 51da6f6a)
        sync: false
      - key: NEO4J_PASSWORD       # NEO4J_PASSWORD du fichier Aura
        sync: false
      - key: NEO4J_DATABASE       # NEO4J_DATABASE du fichier Aura (souvent l'ID d'instance aussi)
        sync: false
      - key: MUSICBRAINZ_USER_AGENT   # ex : SONORA/1.0 ( ton-email@exemple.com )
        sync: false
      - key: LASTFM_API_KEY       # optionnel (laisser vide pour désactiver)
        sync: false
